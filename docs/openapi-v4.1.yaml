openapi: 3.0.3
info:
  title: StarMate English API v4.1
  version: 4.1.2
  description: |
    第一阶段（内部自用）API 合同。
    范围：公开招生入口 + 学生/老师/家长/创始人闭环 + 管理台（平台内侧）+ 审计与AI工具。
servers:
  - url: https://localhost
    description: Cloudflare Pages Functions

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      summary: 账号登录
      description: 支持演示角色或正式账号密码登录。
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginPayload'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/health:
    get:
      summary: 服务健康检查
      tags: [system]
      security: []
      responses:
        '200':
          description: 健康状态
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/bootstrap:
    get:
      summary: 角色启动数据
      tags: [system]
      responses:
        '200':
          description: 首屏聚合数据
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/portal:
    get:
      summary: 门户聚合数据
      tags: [system]
      responses:
        '200':
          description: 门户展示数据
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/me:
    get:
      summary: 当前登录人信息
      tags: [system]
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/public/courses:
    get:
      summary: 获取公开课程列表
      tags: [public]
      security: []
      parameters:
        - in: query
          name: institutionId
          schema: { type: string }
        - in: query
          name: grade
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: classType
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 课程列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/public/courses/{id}:
    get:
      summary: 获取公开课程详情
      tags: [public]
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 课程详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/public/leads:
    get:
      summary: 平台可见咨询线索列表（用于运营排查）
      tags: [public]
      parameters:
        - in: query
          name: institutionId
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: 线索列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    post:
      summary: 提交公开咨询线索
      tags: [public]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicLeadPayload'
      responses:
        '200':
          description: 提交结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/public/leads/{leadId}/ai-reply:
    post:
      summary: AI 回复咨询线索（模拟优先）
      tags: [public]
      security: []
      parameters:
        - in: path
          name: leadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadAiReplyPayload'
      responses:
        '200':
          description: 回复结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/public/trial-bookings:
    post:
      summary: 提交试听预约
      tags: [public]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrialBookingPayload'
      responses:
        '200':
          description: 预约结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/student/today-path:
    get:
      summary: 学生今日学习路径
      tags: [student]
      responses:
        '200':
          description: 今日任务和状态
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/student/voice-practice/assess:
    post:
      summary: 语音对练评分
      tags: [student]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceAssessPayload'
      responses:
        '200':
          description: 评分结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/student/review/{type}:
    get:
      summary: 学习复盘
      tags: [student]
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [summary, mistakes, history]
      responses:
        '200':
          description: 复盘结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/student/courses:
    get:
      summary: 学生课程列表
      tags: [student]
      responses:
        '200':
          description: 已报课程
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/student/lesson-account:
    get:
      summary: 学生课时账户
      tags: [student]
      responses:
        '200':
          description: 课时余额
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/student/report-export:
    get:
      summary: 学生阶段报告导出
      tags: [student]
      parameters:
        - in: query
          name: studentId
          schema: { type: string }
      responses:
        '200':
          description: 报告内容
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/students:
    get:
      summary: 老师可见学生
      tags: [teacher]
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 学生列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/exceptions:
    get:
      summary: 获取课次异常列表
      tags: [teacher]
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: courseId
          schema: { type: string }
        - in: query
          name: studentId
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 课次异常列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    post:
      summary: 上报/新增课次异常
      tags: [teacher]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherExceptionPayload'
      responses:
        '200':
          description: 异常提交
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/student/{studentId}/detail:
    get:
      summary: 获取学生详情
      tags: [teacher]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 学生详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/student/{studentId}/intervention:
    post:
      summary: 提交教师干预
      tags: [teacher]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interventionType, action, note]
              properties:
                interventionType:
                  type: string
                  description: 干预类型
                action:
                  type: string
                  description: 具体行动建议
                note:
                  type: string
                  description: 处理说明
                dueAt:
                  type: string
                  format: date-time
                  description: 计划完成截止时间
                priority:
                  type: string
                  enum: [low, medium, high]
                  description: 优先级
                channel:
                  type: string
                  description: 干预来源
      responses:
        '200':
          description: 干预提交结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/student/{studentId}/exercise:
    post:
      summary: 下发老师生成的练习题
      tags: [teacher]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 练习任务标题
                tasks:
                  type: array
                  items: { type: string }
                  description: 题目或练习步骤
                lessonId:
                  type: string
                  description: 来源课次 ID
                topic:
                  type: string
                  description: 来源课程主题
                difficulty:
                  type: string
                  description: 难度
      responses:
        '200':
          description: 练习下发结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/courses:
    get:
      summary: 老师课程列表
      tags: [teacher]
      parameters:
        - in: query
          name: grade
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: classType
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 课程列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/teacher/courses/{courseId}/attendance:
    get:
      summary: 获取课程点名表
      tags: [teacher]
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 学生点名明细
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    post:
      summary: 一键消课（到课/迟到/缺课）
      tags: [teacher]
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherAttendancePayload'
      responses:
        '200':
          description: 点名处理结果；到课/迟到会在 summary.lessons 返回 hoursDeducted、beforeRemaining、afterRemaining
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/parent/children:
    get:
      summary: 家长绑定孩子列表
      tags: [parent]
      responses:
        '200':
          description: 孩子列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/parent/child/{id}/summary:
    get:
      summary: 孩子学习汇总
      tags: [parent]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 学习与出勤摘要
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/parent/child/{id}/report-export:
    get:
      summary: 家长阶段报告导出
      tags: [parent]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: institutionId
          schema: { type: string }
      responses:
        '200':
          description: 报告内容
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/parent/child/{id}/courses:
    get:
      summary: 孩子课程列表
      tags: [parent]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 课程安排
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/parent/child/{id}/lesson-account:
    get:
      summary: 孩子课时账户
      tags: [parent]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 课时与余额
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/parent/child/{id}/payment-records:
    get:
      summary: 孩子缴费记录
      tags: [parent]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: 缴费记录
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/cockpit:
    get:
      summary: 创始人经营驾驶舱
      tags: [founder]
      parameters:
        - in: query
          name: courseStatus
          schema: { type: string }
        - in: query
          name: leadStatus
          schema: { type: string }
        - in: query
          name: paymentStatus
          schema: { type: string }
        - in: query
          name: startAt
          schema: { type: string }
        - in: query
          name: endAt
          schema: { type: string }
        - in: query
          name: aiStartAt
          schema: { type: string }
        - in: query
          name: aiEndAt
          schema: { type: string }
      responses:
        '200':
          description: 经营总览
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/courses:
    get:
      summary: 创始人课程管理
      tags: [founder]
      parameters:
        - in: query
          name: grade
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: classType
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 课程管理列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    post:
      summary: 新建课程
      tags: [founder]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoursePayload'
      responses:
        '200':
          description: 创建结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    patch:
      summary: 修改课程
      tags: [founder]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoursePatchPayload'
      responses:
        '200':
          description: 修改结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/payment-records:
    get:
      summary: 创始人缴费记录
      tags: [founder]
      parameters:
        - in: query
          name: studentId
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 缴费记录列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/lesson-accounts:
    get:
      summary: 创始人课时账户
      tags: [founder]
      parameters:
        - in: query
          name: studentId
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 课时账户列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    post:
      summary: 调整课时/新增课时
      tags: [founder]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonAccountAdjustPayload'
      responses:
        '200':
          description: 调整结果；reason 必填并写入课时账户 notes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/ai-usage:
    get:
      summary: 创始人 AI 用量查询
      tags: [founder]
      parameters:
        - in: query
          name: startAt
          schema: { type: string, format: date-time }
        - in: query
          name: endAt
          schema: { type: string, format: date-time }
        - in: query
          name: includeUsers
          schema:
            type: boolean
        - in: query
          name: userLimit
          schema: { type: integer }
      responses:
        '200':
          description: AI 用量汇总
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/attendance-records:
    get:
      summary: 点名与上课记录
      tags: [founder]
      parameters:
        - in: query
          name: studentId
          schema: { type: string }
        - in: query
          name: courseId
          schema: { type: string }
        - in: query
          name: startAt
          schema: { type: string }
        - in: query
          name: endAt
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 点名记录列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/leads:
    get:
      summary: 创始人咨询线索列表
      tags: [founder]
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: 线索列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    post:
      summary: 新建咨询线索
      tags: [founder]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicLeadPayload'
      responses:
        '200':
          description: 创建结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    patch:
      summary: 批量更新线索状态
      tags: [founder]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadPatchPayload'
      responses:
        '200':
          description: 更新结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/leads/{leadId}:
    patch:
      summary: 单条线索更新
      tags: [founder]
      parameters:
        - in: path
          name: leadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadPatchPayload'
      responses:
        '200':
          description: 更新结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/leads/{leadId}/takeover:
    post:
      summary: 咨询线索人工接管
      tags: [founder]
      parameters:
        - in: path
          name: leadId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadTakeoverPayload'
      responses:
        '200':
          description: 接管结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/founder/leads/{leadId}/convert:
    post:
      summary: 咨询线索转正式学生
      tags: [founder]
      parameters:
        - in: path
          name: leadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadConvertPayload'
      responses:
        '200':
          description: 转换结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /api/v1/admin/institutions:
    get:
      summary: 平台机构列表（含分页）
      tags: [admin]
      security:
