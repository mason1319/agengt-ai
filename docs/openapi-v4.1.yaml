components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 业务码（0 表示成功）
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
          additionalProperties: true
        request_id:
          type: string
        trace_id:
          type: string

    AuthLoginPayload:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [platform, founder, teacher, parent, student] }
        username: { type: string }
        password: { type: string }

    PublicLeadPayload:
      type: object
      required: [institutionId, guardianName]
      properties:
        institutionId: { type: string }
        guardianName: { type: string }
        studentGrade: { type: string }
        needSummary: { type: string }
        status: { type: string }
        aiRecommendation: { type: string }
        privacyConsent: { type: boolean }

    LeadAiReplyPayload:
      type: object
      properties:
        message: { type: string }
        needSummary: { type: string }

    TrialBookingPayload:
      type: object
      required: [leadId, institutionId, courseId, reservedAt]
      properties:
        leadId: { type: string }
        institutionId: { type: string }
        courseId: { type: string }
        teacherId: { type: string }
        reservedAt: { type: string, format: date-time }
        durationMinutes: { type: integer }
        sourceChannel: { type: string }
        notes: { type: string }
        status: { type: string }

    VoiceAssessPayload:
      type: object
      required: [studentId, institutionId, transcript]
      properties:
        studentId: { type: string }
        institutionId: { type: string }
        transcript: { type: string }
        taskId: { type: string }
        score: { type: integer }

    TeacherExceptionPayload:
      type: object
      required: [studentId, status]
      properties:
        studentId: { type: string }
        courseId: { type: string }
        status: { type: string, enum: [absent, late, leave] }
        note: { type: string }

    TeacherAttendancePayload:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [attended, late, absent, leave] }
        note: { type: string }
        sourceLessonId: { type: string }
        attendedAt: { type: string, format: date-time }
        studentIds: { type: array, items: { type: string } }
        studentId: { type: string }

    CoursePayload:
      type: object
      required: [name, grade]
      properties:
        name: { type: string }
        grade: { type: string }
        level: { type: string }
        classType: { type: string }
        class_type: { type: string }
        schedule: { type: string }
        startTime: { type: string }
        start_time: { type: string }
        durationMinutes: { type: integer }
        duration_minutes: { type: integer }
        capacity: { type: integer }
        priceCents: { type: integer }
        price_cents: { type: integer }
        status: { type: string }
        imageUrl: { type: string }
        image_url: { type: string }
        teacherId: { type: string }

    CoursePatchPayload:
      allOf:
        - $ref: '#/components/schemas/CoursePayload'
      properties:
        id: { type: string }
        courseId: { type: string }

    LessonAccountAdjustPayload:
      type: object
      required: [studentId, purchasedHours, amountCents, reason]
      properties:
        studentId: { type: string }
        purchasedHours: { type: integer }
        amountCents: { type: integer }
        reason: { type: string }
        expiresAt: { type: string, format: date-time }

    LeadPatchPayload:
      type: object
      required: [leadId]
      properties:
        leadId: { type: string }
        status: { type: string }
        studentGrade: { type: string }
        needSummary: { type: string }
        aiRecommendation: { type: string }

    LeadTakeoverPayload:
      type: object
      properties:
        note: { type: string }

    LeadConvertPayload:
      type: object
      required: [studentName, grade]
      properties:
        studentName: { type: string }
        grade: { type: string }
        teacherId: { type: string }
        courseId: { type: string }
        enroll: { type: boolean }
        enrollmentStatus: { type: string }
        guardianPhone: { type: string }
        guardianWechat: { type: string }
        paymentAmountCents: { type: integer }
        paymentMethod: { type: string }
        paymentStatus: { type: string }
        currency: { type: string }
        paidAt: { type: string, format: date-time }
        orderNo: { type: string }
        renewalRisk: { type: integer }
        notes: { type: string }

    AiAgentPayload:
      type: object
      required: [action, payload]
      properties:
        action: { type: string }
        institutionId: { type: string }
        payload:
          type: object
          additionalProperties: true

    InstitutionUpdatePayload:
      type: object
      required: [institutionId]
      properties:
        institutionId: { type: string }
        id: { type: string }
        status: { type: string }
        planCode: { type: string }
        planMode: { type: string }
        studentLimit: { type: integer }
        teacherLimit: { type: integer }
        aiLimitMonthly: { type: integer }
        action: { type: string }
        trialEndsAt: { type: string, format: date-time }
        subscriptionStartsAt: { type: string, format: date-time }
        subscriptionEndsAt: { type: string, format: date-time }

    InstitutionPermissionPayload:
      type: object
      required: [userId, permissionCode]
      properties:
        userId: { type: string }
        permissionCode: { type: string }

    CultureWallDeletePayload:
      type: object
      required: [institutionId, id]
      properties:
        institutionId: { type: string }
        id: { type: string }
